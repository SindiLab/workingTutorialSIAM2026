<svg viewBox="0 0 660 290" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" role="img">
  <title>Simple CNN Architecture — DL Example 1</title>
  <desc>One convolutional layer (16 filters, 3x3, ReLU), flatten, single sigmoid output. 12,705 total parameters.</desc>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ─── INPUT IMAGE ─────────────────────────────────────── -->
  <rect x="28" y="112" width="66" height="66" fill="#4472C4" rx="2"/>
  <line x1="28"  y1="123" x2="94" y2="123" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="28"  y1="134" x2="94" y2="134" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="28"  y1="145" x2="94" y2="145" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="28"  y1="156" x2="94" y2="156" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="28"  y1="167" x2="94" y2="167" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="39"  y1="112" x2="39"  y2="178" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="50"  y1="112" x2="50"  y2="178" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="61"  y1="112" x2="61"  y2="178" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="72"  y1="112" x2="72"  y2="178" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="83"  y1="112" x2="83"  y2="178" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <text x="61" y="97"  text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Input</text>
  <text x="61" y="196" text-anchor="middle" font-size="9"  fill="#666">28 × 28 × 1</text>

  <!-- arrow 1 -->
  <line x1="97" y1="145" x2="122" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ─── CONV1  28×28×16 ────────────────────────────────── -->
  <rect x="126" y="109" width="66" height="72" fill="#ED7D31" rx="1"/>
  <polygon points="126,109 192,109 222,97  156,97"  fill="#F4B183"/>
  <polygon points="192,109 192,181 222,169 222,97"  fill="#C55A11"/>
  <line x1="126" y1="109" x2="156" y2="97"  stroke="#9C3D00" stroke-width="0.7"/>
  <line x1="156" y1="97"  x2="222" y2="97"  stroke="#9C3D00" stroke-width="0.7"/>
  <line x1="222" y1="97"  x2="222" y2="169" stroke="#9C3D00" stroke-width="0.7"/>
  <text x="174" y="84"  text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Conv1</text>
  <text x="174" y="95"  text-anchor="middle" font-size="9"  fill="#555">16 × (3×3) + ReLU</text>
  <text x="174" y="196" text-anchor="middle" font-size="9"  fill="#666">28 × 28 × 16</text>
  <!-- depth annotation -->
  <text x="230" y="101" font-size="8" fill="#C55A11" font-style="italic">16 filters</text>
  <line x1="226" y1="133" x2="230" y2="106" stroke="#C55A11" stroke-width="0.8"/>

  <!-- arrow 2 + flatten label -->
  <line x1="225" y1="145" x2="268" y2="145" stroke="#666" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="247" y="133" text-anchor="middle" font-size="9" fill="#888">Flatten</text>

  <!-- ─── FLATTEN STRIP ──────────────────────────────────── -->
  <rect x="272" y="95" width="14" height="100" fill="#ED7D31" rx="1"/>
  <text x="279" y="210" text-anchor="middle" font-size="9" fill="#666">12,544</text>

  <!-- fan of connecting lines flatten → output -->
  <line x1="287" y1="103" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="114" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="126" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="138" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="145" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="157" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="170" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>
  <line x1="287" y1="183" x2="360" y2="145" stroke="#ddd" stroke-width="0.8"/>

  <!-- ─── OUTPUT ─────────────────────────────────────────── -->
  <circle cx="386" cy="145" r="26" fill="#70AD47"/>
  <text x="386" y="84"  text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Output</text>
  <text x="386" y="149" text-anchor="middle" font-size="11" fill="white" font-weight="bold">p</text>
  <text x="386" y="185" text-anchor="middle" font-size="9"  fill="#666">sigmoid</text>

  <!-- ─── PARAMS BADGE ───────────────────────────────────── -->
  <rect x="440" y="125" width="195" height="40" rx="6" fill="#F2F2F2" stroke="#ccc" stroke-width="1"/>
  <text x="537" y="141" text-anchor="middle" font-size="9.5" fill="#555" font-weight="bold">12,705 total parameters</text>
  <text x="537" y="157" text-anchor="middle" font-size="8.5" fill="#888">160 in conv   +   12,545 in dense</text>

  <!-- ─── BOTTOM NOTE ────────────────────────────────────── -->
  <text x="30" y="240" font-size="8.5" fill="#aaa">Block depth = 16 channels (one per learned filter).  Same spatial size in → out (padding = 'same').  No pooling.</text>
</svg>
